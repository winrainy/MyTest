<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇 Snake</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app">
    <h1 class="title">贪吃蛇 🐍</h1>

    <div class="scoreboard">
      <div class="score-item">
        <span class="score-label">得分</span>
        <span id="score" class="score-value">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">最高分</span>
        <span id="best" class="score-value">0</span>
      </div>
    </div>

    <div class="board-wrap">
      <canvas id="board" width="400" height="400"></canvas>
      <div id="overlay" class="overlay hidden">
        <p id="overlay-text" class="overlay-text"></p>
        <p class="overlay-hint">按 空格 / 点击「开始」重新开始</p>
      </div>
    </div>

    <div class="controls">
      <button id="start-btn" class="btn btn-primary" type="button">开始游戏</button>
      <button id="pause-btn" class="btn" type="button" disabled>暂停</button>
    </div>

    <p class="hint">使用 方向键 或 WASD 控制方向 · 空格 暂停/继续</p>
  </main>

  <script src="js/config.js"></script>
  <script src="js/model.js"></script>
  <script src="js/view.js"></script>
  <script src="js/controller.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
