<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC 红白机游戏机</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="console">
    <div class="console-top">
      <span class="brand">FAMILY&nbsp;COMPUTER</span>
      <span class="led"></span>
    </div>

    <div class="screen-bezel">
      <canvas id="screen" width="256" height="240"></canvas>
    </div>

    <div class="gamepad">
      <div class="dpad">
        <button id="btn-up" class="dpad-btn dpad-up" aria-label="上">▲</button>
        <button id="btn-left" class="dpad-btn dpad-left" aria-label="左">◀</button>
        <span class="dpad-center"></span>
        <button id="btn-right" class="dpad-btn dpad-right" aria-label="右">▶</button>
        <button id="btn-down" class="dpad-btn dpad-down" aria-label="下">▼</button>
      </div>

      <div class="mid-btns">
        <button id="btn-select" class="pill">SELECT</button>
        <button id="btn-start" class="pill">START</button>
      </div>

      <div class="ab-btns">
        <button id="btn-b" class="round-btn">B</button>
        <button id="btn-a" class="round-btn">A</button>
      </div>
    </div>

    <p class="help">
      键盘:方向键/WASD 移动 · J/Z = A · K/X = B · Enter = START · Shift = SELECT
    </p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/engine/utils.js"></script>
  <script src="js/engine/input.js"></script>
  <script src="js/engine/game.js"></script>
  <script src="js/games/mario.js"></script>
  <script src="js/games/tank.js"></script>
  <script src="js/games/contra.js"></script>
  <script src="js/console.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
